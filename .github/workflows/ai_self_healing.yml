          CF_ACCOUNT_ID_5: ${{ secrets.CF_ACCOUNT_ID_5 }}
          CF_API_TOKEN_5: ${{ secrets.CF_API_TOKEN_5 }}
          CF_AI_GATEWAY_URL_5: ${{ secrets.CF_AI_GATEWAY_URL_5 }}
          CF_ACCOUNT_ID_6: ${{ secrets.CF_ACCOUNT_ID_6 }}
          CF_API_TOKEN_6: ${{ secrets.CF_API_TOKEN_6 }}
          CF_AI_GATEWAY_URL_6: ${{ secrets.CF_AI_GATEWAY_URL_6 }}
          CF_ACCOUNT_ID_7: ${{ secrets.CF_ACCOUNT_ID_7 }}
          CF_API_TOKEN_7: ${{ secrets.CF_API_TOKEN_7 }}
          CF_AI_GATEWAY_URL_7: ${{ secrets.CF_AI_GATEWAY_URL_7 }}
          CF_ACCOUNT_ID_8: ${{ secrets.CF_ACCOUNT_ID_8 }}
          CF_API_TOKEN_8: ${{ secrets.CF_API_TOKEN_8 }}
          CF_AI_GATEWAY_URL_8: ${{ secrets.CF_AI_GATEWAY_URL_8 }}
          CF_ACCOUNT_ID_9: ${{ secrets.CF_ACCOUNT_ID_9 }}
          CF_API_TOKEN_9: ${{ secrets.CF_API_TOKEN_9 }}
          CF_AI_GATEWAY_URL_9: ${{ secrets.CF_AI_GATEWAY_URL_9 }}
          CF_ACCOUNT_ID_10: ${{ secrets.CF_ACCOUNT_ID_10 }}
          CF_API_TOKEN_10: ${{ secrets.CF_API_TOKEN_10 }}
          CF_AI_GATEWAY_URL_10: ${{ secrets.CF_AI_GATEWAY_URL_10 }}
          CF_ACCOUNT_ID_11: ${{ secrets.CF_ACCOUNT_ID_11 }}
          CF_API_TOKEN_11: ${{ secrets.CF_API_TOKEN_11 }}
          CF_AI_GATEWAY_URL_11: ${{ secrets.CF_AI_GATEWAY_URL_11 }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          echo "═══ Running AI Gateway Health Check v12.0 ═══"
          python scripts/ai_gateway_health_check.py \
            --output data/gateway_health_report.json \
            --task ${{ github.event.inputs.task || 'general' }} \
            --max-retries ${{ github.event.inputs.max_retries || '2' }} \
            --providers cerebras cloudflare_ai_gateway \
              cloudflare_workers_ai portkey
          # DO NOT add || true here! Exit code must propagate.
      - name: Display Health Report Summary
        if: always()
        continue-on-error: true
        run: |
          if [ ! -f data/gateway_health_report.json ]; then
            echo "⚠ No health report found"
            exit 0
          fi
          echo "═══ Health Report Summary ═══"
          cat > /tmp/_health_summary.py << 'ENDSCRIPT'
          import json
          try:
              report = json.load(open("data/gateway_health_report.json"))
              summary = report.get("summary", {})
              print(f'Version: {report.get("version", "unknown")}')
              primary_ok = summary.get("primary_ok", 0)
              total = summary.get("total", 0)
              print(f'Primary OK: {primary_ok}/{total}')
              print(f'Degraded: {summary.get("degraded", 0)}')
              print(f'Errors: {summary.get("error", 0)}')
              print(f'Healthy: {summary.get("healthy", False)}')
              print(f'Exit code: {summary.get("exit_code", "?")}')
              print(f'Failure reason: {summary.get("failure_reason", "none")}')
              print()
              for r in report.get("results", []):
                  if r["status"] == "ok":
                      si = "OK"
                  elif "degraded" in r["status"]:
                      si = "DG"
                  else:
                      si = "ER"
                  latency = r.get("latency_ms", 0)
                  print(
                      f'  [{si}] {r["provider"]}: {r["status"]} '
                      f'({latency}ms)'
                  )
              env_val = report.get("env_validation", {})
              if env_val.get("warnings"):
                  print()
                  print("Env warnings:")
                  for w in env_val["warnings"]:
                      print(f'  - {w}')
          except Exception as e:
              print(f"Could not parse report: {e}")
          ENDSCRIPT
          python3 /tmp/_health_summary.py
      - name: Upload Health Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gateway-health-${{ github.run_id }}
          path: data/gateway_health_report.json
          retention-days: 30
          if-no-files-found: warn
      - name: Generate Observability Report
        if: always()
        continue-on-error: true
        run: |
          echo "═══ Generating Observability Report ═══"
          cat > /tmp/_obs_report.py << 'ENDSCRIPT'
          import json, sys, os
          sys.path.insert(0, ".")
          try:
              from monitoring.structured_logging import (
                  ProviderHealthMetrics,
                  FailureAnalytics,
                  HealthReportGenerator,
              )
              metrics = ProviderHealthMetrics()
              analytics = FailureAnalytics()
              health_report_path = "data/gateway_health_report.json"
              if os.path.exists(health_report_path):
                  try:
                      with open(health_report_path) as f:
                          health_report = json.load(f)
                      for result in health_report.get("results", []):
                          provider = result.get("provider", "unknown")
                          status = result.get("status", "unknown")
                          latency = result.get("latency_ms", 0)
                          is_success = status == "ok"
                          metrics.record_request(
                              provider_name=provider, success=is_success,
                              latency_ms=latency,
                              error=(
                                  result.get("error")
                                  if not is_success
                                  else None
                              ),
                          )
                          if not is_success:
                              analytics.record_failure(
                                  provider=provider,
                                  error_message=result.get("error", "unknown"),
                                  http_status=result.get("http_status"),
                              )
                  except Exception as e:
                      print(f"Warning: Could not parse health report: {e}")
              generator = HealthReportGenerator(
                  metrics=metrics,
                  analytics=analytics,
              )
              report = generator.generate()
              report_path = generator.save("data/observability_report.json")
              print(f"Observability Report: {report['overall_status'].upper()}")
              print(f"Report saved to: {report_path}")
              step_summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
              if step_summary:
                  with open(step_summary, "a") as f:
                      f.write("## Observability Report\n\n")
                      overall_status = report["overall_status"].upper()
                      f.write(
                          f"**Overall Status:** `{overall_status}`\n\n"
                      )
                      f.write(f"**Timestamp:** {report['timestamp']}\n\n")
                      f.write("### Provider Health\n\n")
                      f.write(
                          "| Provider | Requests | Success Rate | "
                          "Avg Latency |\n"
                      )
                      f.write(
                          "|----------|----------|--------------|"
                          "-------------|\n"
                      )
                      provider_stats = report.get("provider_stats", {})
                      for name, stats in provider_stats.items():
                          reqs = stats.get("request_count", 0)
                          rate = stats.get("success_rate", 0)
                          lat = stats.get("avg_latency_ms", 0)
                          f.write(
                              f"| {name} | {reqs} | {rate:.1%} | "
                              f"{lat:.0f}ms |\n"
                          )
          except Exception as e:
              print(f"Observability report generation failed: {e}")
          ENDSCRIPT
          python3 /tmp/_obs_report.py
      - name: Upload Observability Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: observability-report-${{ github.run_id }}
          path: data/observability_report.json
          retention-days: 30
          if-no-files-found: warn
      - name: Upload All Reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: health-and-observability-${{ github.run_id }}
          path: |
            data/gateway_health_report.json
            data/observability_report.json
          retention-days: 30
          if-no-files-found: warn
  gateway-health-cleanup:
    name: AI Ultra-Pro Cleanup
    if: always()
    needs:
      - gateway-health-check-all-providers
    uses: ./.github/workflows/ai-ultra-pro-cleanup.yml
    secrets: inherit
    with:
      keep_last_n: "2"
      dry_run: false
  legacy-cleanup-wrapper-cleanup:
    if: always()
    uses: ./.github/workflows/ai-ultra-pro-cleanup.yml
    secrets: inherit
    with:
      keep_last_n: ${{ inputs.keep_last_n || '2' }}
      dry_run: ${{ (inputs.dry_run || 'true') == 'true' }}
  ultra-pro-cleanup:
    name: 🧹 Global Cleanup — All Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 🧠 AI Ultra-Pro Global Cleanup — Zero-Error Autonomous Engine v4.0
        if: always()
        uses: actions/github-script@v8
        env:
          KEEP_LAST_N: ${{ inputs.keep_last_n || '2' }}
          DRY_RUN_INPUT: ${{ inputs.dry_run }}
          EVENT_NAME: ${{ github.event_name }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const rawKeepLast = Number.parseInt(process.env.KEEP_LAST_N || '2', 10);
            const KEEP_LAST_N = Number.isFinite(rawKeepLast) && rawKeepLast >= 2 ? rawKeepLast : 2;
            const rawDryRunInput = String(process.env.DRY_RUN_INPUT || '').trim().toLowerCase();
            const EVENT_NAME = String(process.env.EVENT_NAME || context.eventName || '').trim();
            let DRY_RUN;
            let DRY_RUN_SOURCE;
            if (rawDryRunInput === 'true' || rawDryRunInput === 'false') {
              DRY_RUN = rawDryRunInput === 'true';
              DRY_RUN_SOURCE = `input dry_run=${rawDryRunInput}`;
            } else if (EVENT_NAME === 'schedule') {
              DRY_RUN = false;
              DRY_RUN_SOURCE = 'schedule default dry_run=false';
            } else {
              DRY_RUN = true;
              DRY_RUN_SOURCE = `${EVENT_NAME || 'unknown event'} default dry_run=true`;
            }
            const THROTTLE_MS = 250;
            const MAX_RETRIES = 4;
            const CURRENT_RUN_ID = Number(context.runId);

            const { owner, repo } = context.repo;
            const sleep = ms => new Promise(resolve => setTimeout(resolve, ms));
            const mdCell = value => String(value).replaceAll('|', '\\|').replace(/\r?\n/g, ' ');
            const ACTIVE_STATUSES = new Set(['in_progress', 'queued', 'requested', 'waiting', 'pending']);

            async function withRetry(fn, label) {
              for (let attempt = 1; attempt <= MAX_RETRIES; attempt++) {
                try {
                  return { ok: true, data: await fn() };
                } catch (err) {
                  const s = err.status ?? 0;
                  const msg = err.message || String(err);
                  if (s === 404) return { ok: false, reason: 'not_found', detail: msg };
                  if (s === 409) return { ok: false, reason: 'active_lock', detail: msg };
                  if (s === 401 || s === 422) return { ok: false, reason: 'api_rejected', detail: msg };
                  if (s === 403 && msg.includes('Cannot delete')) return { ok: false, reason: 'protected', detail: msg };
                  if (attempt === MAX_RETRIES) return { ok: false, reason: 'error', detail: `HTTP ${s}: ${msg}` };

                  const retryAfter = Number(err.response?.headers?.['retry-after'] || 0) * 1000;
                  const backoff = Math.max(retryAfter, THROTTLE_MS * Math.pow(2, attempt));
                  const tag = (s === 429 || s === 403) ? 'Rate-limit' : `HTTP ${s}`;
                  core.warning(`[${label}] ${tag} — retry ${attempt}/${MAX_RETRIES - 1} in ${backoff} ms`);
                  await sleep(backoff);
                }
              }
              return { ok: false, reason: 'exhausted' };
            }

            let extraThrottle = 0;
            try {
              const { data: rl } = await github.rest.rateLimit.get();
              const c = rl.resources.core;
              const pct = Math.round((c.remaining / c.limit) * 100);
              core.info(`🔋 API Quota: ${c.remaining}/${c.limit} (${pct}%) | Resets: ${new Date(c.reset * 1000).toUTCString()}`);
              if (c.remaining < 200) {
                extraThrottle = 500;
                core.warning('⚠️ Low API quota — adding +500 ms extra throttle per call');
              }
            } catch (e) {
              core.warning(`Rate-limit pre-check skipped (non-critical): ${e.message}`);
            }

            const effectiveThrottle = THROTTLE_MS + extraThrottle;
            core.startGroup('🚀 Engine Initializing');
            core.info(`Repository   : ${owner}/${repo}`);
            core.info(`Policy       : Protect at least the latest 2 runs per workflow (effective keep: ${KEEP_LAST_N})`);
            core.info(`Mode         : ${DRY_RUN ? '🔵 DRY-RUN — preview only' : '🔴 LIVE — deletions enabled'} (${DRY_RUN_SOURCE})`);
            core.info(`Self-Guard   : Run ID ${CURRENT_RUN_ID} is protected`);
            core.info(`Throttle     : ${effectiveThrottle} ms between delete calls`);
            core.endGroup();

            const wfRes = await withRetry(
              () => github.paginate(github.rest.actions.listRepoWorkflows, { owner, repo, per_page: 100 }),
              'listRepoWorkflows'
            );

            if (!wfRes.ok) {
              const reason = wfRes.detail || wfRes.reason || 'unknown error';
              core.warning(`Cleanup skipped: cannot list workflows — ${reason}`);
              await core.summary
                .addRaw('## 🧹 AI Ultra-Pro Cleanup Skipped\n\n')
                .addRaw(`> Cleanup did not run because workflows could not be listed: ${mdCell(reason)}\n`)
                .write();
              return;
            }

            const workflows = wfRes.data;
            core.info(`\n📂 Discovered ${workflows.length} workflow definition(s). Starting global sweep...\n`);

            let gScanned = 0, gKept = 0, gDeleted = 0, gSkipped = 0, gFailed = 0;
            const rows = [];

            for (const wf of workflows) {
              core.startGroup(`📋 Workflow: "${wf.name}" (id: ${wf.id})`);
              const runsRes = await withRetry(
                () => github.paginate(github.rest.actions.listWorkflowRuns, { owner, repo, workflow_id: wf.id, per_page: 100 }),
                `listRuns:${wf.id}`
              );

              if (!runsRes.ok) {
                core.warning(`  ⚠️ Cannot list runs (${runsRes.reason}) — skipping this workflow`);
                rows.push({ name: wf.name, total: '?', kept: '?', del: 0, skip: 0, fail: 0, st: '⚠️ Skipped' });
                core.endGroup();
                continue;
              }

              const allRuns = runsRes.data.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              gScanned += allRuns.length;
              const protectedRuns = allRuns.slice(0, KEEP_LAST_N);
              const candidates = allRuns.slice(KEEP_LAST_N);
              gKept += protectedRuns.length;

              core.info(`  Total Runs  : ${allRuns.length}`);
              core.info(`  Protected   : ${protectedRuns.length ? protectedRuns.map(r => `#${r.run_number}`).join(', ') : '(none)'}`);
              core.info(`  Candidates  : ${candidates.length} run(s) queued for deletion`);

              let wDel = 0, wSkip = 0, wFail = 0;
              for (const run of candidates) {
                const lbl = `run #${run.run_number} (id: ${run.id}, status: ${run.status})`;
                if (Number(run.id) === CURRENT_RUN_ID) { core.info(`  🔒 Self-protection active — skip ${lbl}`); wSkip++; continue; }
                if (ACTIVE_STATUSES.has(run.status)) { core.info(`  ⏭️  Active run — skip ${lbl}`); wSkip++; continue; }
                if (DRY_RUN) { core.info(`  🔵 [DRY-RUN] Would delete: ${lbl}`); wDel++; continue; }

                const delRes = await withRetry(
                  () => github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id }),
                  `deleteRun:${run.id}`
                );

                if (delRes.ok || delRes.reason === 'not_found') { core.info(`  ✅ Deleted/already gone: ${lbl}`); wDel++; }
                else if (delRes.reason === 'active_lock' || delRes.reason === 'protected') { core.info(`  ⏭️  Skipped (${delRes.reason}): ${lbl}`); wSkip++; }
                else { core.warning(`  ❌ Failed: ${lbl} — ${delRes.detail || delRes.reason}`); wFail++; }
                await sleep(effectiveThrottle);
              }

              gDeleted += wDel; gSkipped += wSkip; gFailed += wFail;
              rows.push({ name: wf.name, total: allRuns.length, kept: protectedRuns.length, del: wDel, skip: wSkip, fail: wFail, st: wFail > 0 ? '⚠️' : '✅' });
              core.info(`  ── Result: deleted=${wDel}  skipped=${wSkip}  failed=${wFail}`);
              core.endGroup();
            }

            core.startGroup('📊 Final Cleanup Report');
            core.info(`${'Workflow'.padEnd(46)}Total   Kept  Deleted  Skipped  Failed  St`);
            core.info('─'.repeat(90));
            for (const r of rows) {
              const n = String(r.name).slice(0, 45).padEnd(46);
              core.info(`${n}${String(r.total).padStart(5)}  ${String(r.kept).padStart(4)}  ${String(r.del).padStart(7)}  ${String(r.skip).padStart(7)}  ${String(r.fail).padStart(6)}  ${r.st}`);
            }
            core.info('─'.repeat(90));
            core.info(`${'GRAND TOTAL'.padEnd(46)}${String(gScanned).padStart(5)}  ${String(gKept).padStart(4)}  ${String(gDeleted).padStart(7)}  ${String(gSkipped).padStart(7)}  ${String(gFailed).padStart(6)}`);
            core.endGroup();

            const dryLabel = DRY_RUN ? ' — DRY-RUN MODE' : '';
            let md = `## 🧹 AI Ultra-Pro Cleanup Report${dryLabel}\n\n`;
            md += `> **Repo:** \`${owner}/${repo}\``;
            md += ` · **Policy:** protect at least the latest 2 runs per workflow (effective keep: ${KEEP_LAST_N})`;
            md += ` · **Mode:** ${DRY_RUN ? '🔵 Dry-Run' : '🔴 Live'}`;
            md += ` · **Engine:** v4.0\n\n`;
            md += '| Workflow | Total | Kept | Deleted | Skipped | Failed | Status |\n';
            md += '|:---------|------:|-----:|--------:|--------:|-------:|:------:|\n';
            for (const r of rows) {
              md += `| ${mdCell(r.name)} | ${r.total} | ${r.kept} | ${r.del} | ${r.skip} | ${r.fail} | ${r.st} |\n`;
            }
            md += `| **GRAND TOTAL** | **${gScanned}** | **${gKept}** | **${gDeleted}** | **${gSkipped}** | **${gFailed}** | ${gFailed === 0 ? '✅ Clean' : '⚠️ Check Logs'} |\n`;
            if (DRY_RUN) {
              md += '\n> 🔵 **Dry-Run active** — zero actual deletions were performed. Set `dry_run: false` only after reviewing this output.\n';
            }
            await core.summary.addRaw(md).write();

            core.info(DRY_RUN
              ? `🔵 Dry-run complete. ${gDeleted} run(s) would be removed across ${workflows.length} workflow(s).`
              : `🎉 Cleanup complete! Deleted: ${gDeleted} | Kept: ${gKept} | Across ${workflows.length} workflow(s).`);
            if (gFailed > 0) core.warning(`⚠️ ${gFailed} deletion(s) could not complete — pipeline continues normally.`);
