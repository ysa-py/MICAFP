# Compatibility wrapper for manual workflow-run cleanup.
# The reusable cleanup workflow is the source of truth.
name: Cleanup Workflow Runs

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Preview deletions without deleting workflow runs. Set to false only after reviewing dry-run output.'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      keep_last_n:
        description: 'Number of newest workflow runs to keep per workflow.'
        required: false
        default: '2'
        type: string

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    if: always()
    uses: ./.github/workflows/ai-ultra-pro-cleanup.yml
    secrets: inherit
    with:
      keep_last_n: ${{ inputs.keep_last_n || '2' }}
      dry_run: ${{ (inputs.dry_run || 'true') == 'true' }}
