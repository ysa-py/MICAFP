---
name: CI — Autonomous Orchestrator

'on':
  push:
    branches: ["**"]
  pull_request:
    branches: [main, master]

jobs:
  # ── Python lint + unit tests ──────────────────────────────────
  python-tests:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio flake8 mypy
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names; ignore line-length for now
          flake8 autonomous/ tests/ \
            --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 autonomous/ tests/ \
            --count --exit-zero --max-line-length=100 --statistics

      - name: Type check with mypy
        run: |
          mypy autonomous/anti_censorship/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --allow-untyped-defs \
            || true   # non-blocking until fully typed

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short \
            --asyncio-mode=auto \
            -p no:warnings
        env:
          PYTHONPATH: ${{ github.workspace }}

  # ── Shell script syntax check ─────────────────────────────────
  shell-check:
    name: Shell (bash -n + shellcheck)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Syntax check all shell scripts
        run: |
          find scripts/ -name "*.sh" | while read -r f; do
            echo "Checking $f"
            bash -n "$f"
            shellcheck -S warning "$f"
          done

  # ── YAML validation ───────────────────────────────────────────
  yaml-check:
    name: YAML validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint YAML files
        run: |
          yamllint .github/

  # ── Anti-censorship integration test ─────────────────────────
  anti-censorship-smoke:
    name: Anti-censorship smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install pytest pytest-asyncio
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Smoke test — import and initialize router
        run: |
          python - <<'EOF'
          import asyncio, sys
          sys.path.insert(0, ".")
          from autonomous.anti_censorship import SmartAntiCensorshipRouter
          from autonomous.anti_censorship.iran import IranBypassConfig

          async def test():
              cfg    = IranBypassConfig.recommended()
              router = SmartAntiCensorshipRouter(bypass_config=cfg)
              # In CI the network may be open — router should handle both cases
              await router.initialize()
              status = router.get_status()
              assert status["initialized"], "Router did not initialize"
              print("Anti-censorship smoke test passed:", status)

          asyncio.run(test())
          EOF
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Run full anti-censorship test suite
        run: |
          python -m pytest tests/test_anti_censorship.py -v \
            --asyncio-mode=auto \
            -p no:warnings
        env:
          PYTHONPATH: ${{ github.workspace }}
