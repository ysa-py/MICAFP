name: CI — Autonomous Orchestrator
on:
  push:
    branches:
    - '**'
    - work
    - main
  pull_request:
    branches:
    - main
    - master
  workflow_dispatch:
jobs:
  python-tests:
    name: Python (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.10'
        - '3.11'
        - '3.12'
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-asyncio flake8 mypy
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        # Stop on syntax errors or undefined names; ignore line-length for now
        flake8 autonomous/ tests/ \
          --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 autonomous/ tests/ \
          --count --exit-zero --max-line-length=100 --statistics
    - name: Type check with mypy
      run: |
        mypy autonomous/anti_censorship/ \
          --ignore-missing-imports \
          --no-strict-optional \
          --allow-untyped-defs \
          || true   # non-blocking until fully typed
    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --tb=short \
          --asyncio-mode=auto \
          -p no:warnings
      env:
        PYTHONPATH: ${{ github.workspace }}
  shell-check:
    name: Shell (bash -n + shellcheck)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Install ShellCheck
      run: sudo apt-get install -y shellcheck
    - name: Syntax check all shell scripts
      run: |
        find scripts/ -name "*.sh" | while read -r f; do
          echo "Checking $f"
          bash -n "$f"
          shellcheck -S warning "$f"
        done
  yaml-check:
    name: YAML validation
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Install yamllint
      run: pip install yamllint
    - name: Lint YAML files
      run: |
        yamllint .github/
  anti-censorship-smoke:
    name: Anti-censorship smoke test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install deps
      run: |
        pip install pytest pytest-asyncio
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Smoke test — import and initialize router
      run: |
        python - <<'EOF'
        import asyncio, sys
        sys.path.insert(0, ".")
        from autonomous.anti_censorship import SmartAntiCensorshipRouter
        from autonomous.anti_censorship.iran import IranBypassConfig

        async def test():
            cfg    = IranBypassConfig.recommended()
            router = SmartAntiCensorshipRouter(bypass_config=cfg)
            # In CI the network may be open — router should handle both cases
            await router.initialize()
            status = router.get_status()
            assert status["initialized"], "Router did not initialize"
            print("Anti-censorship smoke test passed:", status)

        asyncio.run(test())
        EOF
      env:
        PYTHONPATH: ${{ github.workspace }}
    - name: Run full anti-censorship test suite
      run: |
        python -m pytest tests/test_anti_censorship.py -v \
          --asyncio-mode=auto \
          -p no:warnings
      env:
        PYTHONPATH: ${{ github.workspace }}
  sentinel-validate-and-self-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: '1'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - name: Setup Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: pip
    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: go.mod
        cache: true
    - name: Install Python dependencies
      run: |
        set -euo pipefail
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install -e '.[test,dev]'
    - name: LocalAI RL observe-decide-morph dry run
      run: |
        set -euo pipefail
        python - <<'PY'
        import json
        from torshield_ai_gateway.local_ai_engine import LocalAIEngine
        from torshield_ai_gateway.polymorphic_traffic_morpher import PolymorphicTrafficMorpher
        engine = LocalAIEngine()
        engine.observe_feedback('unknown', 'obfs4', 'success')
        plan = PolymorphicTrafficMorpher(engine).plan(censorship_level=4)
        print(json.dumps(plan, indent=2, sort_keys=True))
        PY
    - name: Validation suite
      id: validate
      shell: bash
      run: |
        set -euo pipefail
        python -m pytest -q
        go test ./...
        bash scripts/check_shell_entrypoints.sh
        python scripts/security_scan.py
    - name: Revert failed generated changes and write analysis
      if: failure()
      run: |
        set -euo pipefail
        mkdir -p data
        python - <<'PY'
        import json, subprocess
        from torshield_ai_gateway.local_ai_engine import LocalAIEngine
        analysis = LocalAIEngine().analyze_workflow_failure('autonomous-sentinel', 'validation failed')
        open('data/autonomous_sentinel_failure.json', 'w', encoding='utf-8').write(json.dumps(analysis, indent=2))
        subprocess.run(['git', 'checkout', '--', 'data/local_ai_censorship_state.json'], check=False)
        PY
    - name: Commit LocalAI state updates
      if: success() && github.event_name != 'pull_request'
      run: |
        set -euo pipefail
        if git diff --quiet -- data/local_ai_censorship_state.json; then
          echo 'No LocalAI state changes to commit.'
          exit 0
        fi
        git config user.name 'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add data/local_ai_censorship_state.json
        git commit -m 'auto(local-ai): update censorship RL state [skip ci]'
        git push
permissions:
  contents: write
  actions: read
