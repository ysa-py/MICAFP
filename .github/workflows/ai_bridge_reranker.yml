# ══════════════════════════════════════════════════════════════════════════
# TorShield-IR AI Bridge Re-Ranker v9.0
# FIXED v9.1:
#   - workflow_run trigger corrected to match main workflow name
#     ("TorShield-IR Bridge Intelligence", not Stage-07 which never existed)
#   - Added pip install -r requirements.txt (was missing, causing ModuleNotFoundError)
#   - Fixed artifact download: name = "bridge-intelligence-report" (matches main workflow)
#   - Fixed default input path: bridge/iran_results.json (was output/bridges_ranked.json)
name: AI Bridge Re-Ranker (Iran)

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  NODE_NO_WARNINGS: '1'
  PYTHONPATH: ${{ github.workspace }}

on:
  workflow_run:
    workflows: ["TorShield-IR Bridge Intelligence"]
    types: [completed]
  workflow_dispatch:
    inputs:
      bridge_file:
        description: 'Path to bridge JSON file'
        required: false
        default: 'bridge/iran_results.json'

permissions:
  actions: write
  contents: read

jobs:
  ai-rerank:
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Bootstrap environment defaults
        run: |
          set -euo pipefail
          bash scripts/github_actions_env_bootstrap.sh

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      # FIX: was missing entirely — caused ModuleNotFoundError on every run
      - name: Install Python dependencies
        run: |
          set -euo pipefail
          pip install -r requirements.txt

      # Download the bridge intelligence report from the main workflow run.
      # Uses the correct artifact name "bridge-intelligence-report" which is
      # what torshield-ir.yml actually uploads (was using "output/" before).
      - name: Download Bridge Artifacts
        if: ${{ github.event_name != 'workflow_dispatch' }}
        env:
          GH_TOKEN: ${{ github.token }}
          UPSTREAM_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set +e
          mkdir -p /tmp/bridge-artifacts bridge
          gh run download "$UPSTREAM_RUN_ID" \
            --name bridge-intelligence-report \
            --dir /tmp/bridge-artifacts
          rc=$?
          if [ "$rc" -ne 0 ]; then
            echo "::warning::bridge-intelligence-report artifact is unavailable for run ${UPSTREAM_RUN_ID}; using local fallback files"
            exit 0
          fi
          cp -R /tmp/bridge-artifacts/. bridge/

      # Ensure bridge directory and fallback files exist
      - name: Ensure bridge dir and fallback files
        run: |
          set -euo pipefail
          mkdir -p bridge data export
          # If iran_results.json doesn't exist, create a minimal valid one
          if [ ! -f bridge/iran_results.json ]; then
            echo '{"bridges":[],"summary":{"total_tested":0}}' > bridge/iran_results.json
            echo "WARNING: bridge/iran_results.json not found — created empty placeholder"
          fi

      - name: Run AI Re-Ranking
        env:
          CEREBRAS_API_KEY_1:   ${{ secrets.CEREBRAS_API_KEY_1 }}
          CEREBRAS_API_KEY_2:   ${{ secrets.CEREBRAS_API_KEY_2 }}
          CEREBRAS_API_KEY_3:   ${{ secrets.CEREBRAS_API_KEY_3 }}
          PORTKEY_API_KEY_1:    ${{ secrets.PORTKEY_API_KEY_1 }}
          PORTKEY_GATEWAY_URL:  ${{ secrets.PORTKEY_GATEWAY_URL }}
          CF_ACCOUNT_ID_1:      ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_API_TOKEN_1:       ${{ secrets.CF_API_TOKEN_1 }}
          CF_AI_GATEWAY_URL_1:  ${{ secrets.CF_AI_GATEWAY_URL_1 }}
          CF_ACCOUNT_ID_2:      ${{ secrets.CF_ACCOUNT_ID_2 }}
          CF_API_TOKEN_2:       ${{ secrets.CF_API_TOKEN_2 }}
          CF_AI_GATEWAY_URL_2:  ${{ secrets.CF_AI_GATEWAY_URL_2 }}
          CF_ACCOUNT_ID_3:      ${{ secrets.CF_ACCOUNT_ID_3 }}
          CF_API_TOKEN_3:       ${{ secrets.CF_API_TOKEN_3 }}
          CF_AI_GATEWAY_URL_3:  ${{ secrets.CF_AI_GATEWAY_URL_3 }}
          CF_ACCOUNT_ID_4:      ${{ secrets.CF_ACCOUNT_ID_4 }}
          CF_API_TOKEN_4:       ${{ secrets.CF_API_TOKEN_4 }}
          CF_AI_GATEWAY_URL_4:  ${{ secrets.CF_AI_GATEWAY_URL_4 }}
          CF_ACCOUNT_ID_5:      ${{ secrets.CF_ACCOUNT_ID_5 }}
          CF_API_TOKEN_5:       ${{ secrets.CF_API_TOKEN_5 }}
          CF_AI_GATEWAY_URL_5:  ${{ secrets.CF_AI_GATEWAY_URL_5 }}
          CF_ACCOUNT_ID_6:      ${{ secrets.CF_ACCOUNT_ID_6 }}
          CF_API_TOKEN_6:       ${{ secrets.CF_API_TOKEN_6 }}
          CF_AI_GATEWAY_URL_6:  ${{ secrets.CF_AI_GATEWAY_URL_6 }}
          CF_ACCOUNT_ID_7:      ${{ secrets.CF_ACCOUNT_ID_7 }}
          CF_API_TOKEN_7:       ${{ secrets.CF_API_TOKEN_7 }}
          CF_AI_GATEWAY_URL_7:  ${{ secrets.CF_AI_GATEWAY_URL_7 }}
          CF_ACCOUNT_ID_8:      ${{ secrets.CF_ACCOUNT_ID_8 }}
          CF_API_TOKEN_8:       ${{ secrets.CF_API_TOKEN_8 }}
          CF_AI_GATEWAY_URL_8:  ${{ secrets.CF_AI_GATEWAY_URL_8 }}
          CF_ACCOUNT_ID_9:      ${{ secrets.CF_ACCOUNT_ID_9 }}
          CF_API_TOKEN_9:       ${{ secrets.CF_API_TOKEN_9 }}
          CF_AI_GATEWAY_URL_9:  ${{ secrets.CF_AI_GATEWAY_URL_9 }}
          CF_ACCOUNT_ID_10:     ${{ secrets.CF_ACCOUNT_ID_10 }}
          CF_API_TOKEN_10:      ${{ secrets.CF_API_TOKEN_10 }}
          CF_AI_GATEWAY_URL_10: ${{ secrets.CF_AI_GATEWAY_URL_10 }}
          CF_ACCOUNT_ID_11:     ${{ secrets.CF_ACCOUNT_ID_11 }}
          CF_API_TOKEN_11:      ${{ secrets.CF_API_TOKEN_11 }}
          CF_AI_GATEWAY_URL_11: ${{ secrets.CF_AI_GATEWAY_URL_11 }}
          GITHUB_RUN_ID:        ${{ github.run_id }}
          BRIDGE_FILE:          ${{ inputs.bridge_file || 'bridge/iran_results.json' }}
        run: |
          set -euo pipefail
          python scripts/ai_bridge_reranker.py \
            --input  "$BRIDGE_FILE" \
            --output bridge/bridges_ai_iran_ranked.json \
            --iran-mode strict \
            --batch-size 10 \
            --ai-top-n "${AI_RERANK_TOP_N:-20}" || true
          # Print summary if output exists
          python3 -c "
          import json, pathlib
          p = pathlib.Path('bridge/bridges_ai_iran_ranked.json')
          if p.exists():
              d = json.loads(p.read_text())
              bs = d.get('bridges', d) if isinstance(d, dict) else d
              total = len(bs)
              print(f'AI-ranked: {total} bridges')
          " || true

      - name: Upload AI-Ranked Bridges
        uses: actions/upload-artifact@v6
        with:
          name: ai-iran-ranked-bridges-${{ github.run_id }}
          path: bridge/bridges_ai_iran_ranked.json
          retention-days: 30
          if-no-files-found: ignore

  cleanup:
    name: Cleanup old workflow runs
    needs: [ai-rerank]
    if: always()
    uses: ./.github/workflows/ai-ultra-pro-cleanup.yml
    secrets: inherit
    with:
      keep_last_n: '2'
      dry_run: true
