name: Go Quality Gate

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  actions: write
  contents: read
  pull-requests: read

jobs:
  go-quality-gate:
    name: Go Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5

      - name: Bootstrap environment defaults
        run: |
          set -euo pipefail
          bash scripts/github_actions_env_bootstrap.sh

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work

      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Go Build
        run: |
          echo "═══ Go Build ═══"
          go build ./...
          echo "✔ Build successful"

      - name: Go Vet
        run: |
          echo "═══ Go Vet ═══"
          go vet ./...
          echo "✔ Vet passed"

      - name: Go Format Check (internal/bridge)
        run: |
          echo "═══ Format Check (internal/bridge) ═══"
          if gofmt -l ./internal/bridge/ | grep -q .; then
            echo "✘ Format check failed:"
            gofmt -l ./internal/bridge/
            echo "Run: gofmt -w ./internal/bridge/"
            exit 1
          fi
          echo "✔ Format check passed"

      - name: Go Tests
        run: |
          echo "═══ Go Tests ═══"
          go test ./... -v
          echo "✔ All tests passed"

  python-quality-gate:
    name: Python Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v5

      - name: Bootstrap environment defaults
        run: |
          set -euo pipefail
          bash scripts/github_actions_env_bootstrap.sh

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python Syntax Check
        run: |
          echo "═══ Python Syntax Check ═══"
          SKIP_NETWORK_TESTS=true python3 -m pytest -q --collect-only 2>/dev/null || true
          for f in $(find . -name '*.py' -not -path './vendor/*' -not -path './.git/*' -not -path './__pycache__/*'); do
            python3 -m py_compile "$f" || exit 1
          done
          echo "✔ All Python files have valid syntax"

  cleanup:
    name: AI Ultra-Pro Cleanup
    if: always()
    needs: [go-quality-gate, python-quality-gate]
    uses: ./.github/workflows/ai-ultra-pro-cleanup.yml
    secrets: inherit
    with:
      keep_last_n: '2'
      dry_run: false
