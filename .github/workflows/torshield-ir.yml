name: TorShield-IR Bridge Intelligence
"on":
  schedule:
    - cron: 0 * * * *
  workflow_dispatch:
    inputs:
      upload_to_telegram:
        description: Upload results to Telegram
        required: false
        default: false
        type: choice
        options:
          - false
          - true
      bridge_file:
        description: Path to bridge JSON file
        required: false
        default: bridge/iran_results.json
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_NO_WARNINGS: "1"
  PYTHONPATH: ${{ github.workspace }}
permissions:
  actions: write
  contents: write
  pull-requests: read
concurrency:
  group: torshield-ir
  cancel-in-progress: true
jobs:
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Bootstrap environment defaults
        run: |
          set -euo pipefail
          bash scripts/github_actions_env_bootstrap.sh
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python dependencies
        run: |
          set -euo pipefail
          pip install -r requirements.txt
      - name: Python syntax check (py_compile)
        run: |
          echo "═══ Python Syntax Check ═══"
          PASS=0
          FAIL=0
          while IFS= read -r -d '' f; do
            if python -m py_compile "$f" 2>/dev/null; then
              PASS=$((PASS + 1))
            else
              echo "  ✗ SYNTAX ERROR: $f"
              python -m py_compile "$f" 2>&1 || true
              FAIL=$((FAIL + 1))
            fi
          done < <(find . -name '*.py' -not -path './vendor/*' -not -path './.git/*' -print0 | sort -z)
          echo "  ✓ Passed: ${PASS}  ✗ Failed: ${FAIL}"
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::${FAIL} Python file(s) have syntax errors"
            exit 1
          fi
      - name: YAML linting
        run: |
          echo "═══ YAML Lint ═══"
          cat > /tmp/_yaml_lint.py << 'ENDSCRIPT'
          import sys
          import yaml


          class GitLabCISafeLoader(yaml.SafeLoader):
              pass


          def construct_reference(loader, node):
              return loader.construct_sequence(node)


          def construct_unknown_tag(loader, tag_suffix, node):
              if isinstance(node, yaml.ScalarNode):
                  return loader.construct_scalar(node)
              if isinstance(node, yaml.SequenceNode):
                  return loader.construct_sequence(node)
              if isinstance(node, yaml.MappingNode):
                  return loader.construct_mapping(node)
              return None


          GitLabCISafeLoader.add_constructor("!reference", construct_reference)
          GitLabCISafeLoader.add_multi_constructor("!", construct_unknown_tag)

          with open(sys.argv[1]) as stream:
              yaml.load(stream, Loader=GitLabCISafeLoader)
          ENDSCRIPT
          PASS=0
          FAIL=0
          while IFS= read -r -d '' f; do
            if python /tmp/_yaml_lint.py "$f" 2>/dev/null; then
              PASS=$((PASS + 1))
            else
              echo "  ✗ YAML ERROR: $f"
              python /tmp/_yaml_lint.py "$f" 2>&1 || true
              FAIL=$((FAIL + 1))
            fi
          done < <(find . \( -name '*.yml' -o -name '*.yaml' \) -not -path './.git/*' -print0 | sort -z)
          echo "  ✓ Passed: ${PASS}  ✗ Failed: ${FAIL}"
          if [ "$FAIL" -gt 0 ]; then
            echo "::error::${FAIL} YAML file(s) have lint errors"
            exit 1
          fi
      - name: Validate requirements.txt
        run: |
          echo "═══ Requirements Validation ═══"
          cat > /tmp/_validate_requirements.py << 'ENDSCRIPT'
          import sys
          errors = []
          with open("requirements.txt") as f:
              for lineno, line in enumerate(f, 1):
                  stripped = line.strip()
                  if not stripped or stripped.startswith("#"):
                      continue
                  # Basic validation: must contain a package name
                  parts = stripped.split(">=") if ">=" in stripped else \
                          stripped.split("==") if "==" in stripped else \
                          stripped.split("~=") if "~=" in stripped else \
                          stripped.split("<") if "<" in stripped else \
                          stripped.split(">")
                  pkg = parts[0].strip()
                  if not pkg or not pkg[0].isalpha():
                      errors.append((lineno, stripped, "invalid package name"))
                  if len(parts) > 1 and not parts[1].strip():
                      errors.append((lineno, stripped, "missing version specifier"))
          if errors:
              for ln, line, reason in errors:
                  print(f"  ✗ Line {ln}: {reason} — {line}")
              print(f"  ✗ {len(errors)} requirement error(s) found")
              sys.exit(1)
          else:
              print("  ✓ All requirements valid")
          ENDSCRIPT
          python3 /tmp/_validate_requirements.py
      - name: Secret presence check
        env:
          CEREBRAS_API_KEY_1: ${{ secrets.CEREBRAS_API_KEY_1 }}
          PORTKEY_API_KEY_1: ${{ secrets.PORTKEY_API_KEY_1 }}
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          GH_PAT_AUTOFIX: ${{ secrets.GH_PAT_AUTOFIX }}
        run: |
          echo "═══ Secret Presence Check ═══"
          SECRETS_FOUND=0
          SECRETS_TOTAL=5
          for var in CEREBRAS_API_KEY_1 PORTKEY_API_KEY_1 CF_ACCOUNT_ID_1 CF_API_TOKEN_1 GH_PAT_AUTOFIX; do
            eval "VAL=\${$var:-}"
            if [ -n "$VAL" ]; then
              echo "  ✓ $var is set"
              SECRETS_FOUND=$((SECRETS_FOUND + 1))
            else
              echo "  ✗ $var is EMPTY"
            fi
          done
          echo "  Secrets found: ${SECRETS_FOUND}/${SECRETS_TOTAL}"
          if [ "$SECRETS_FOUND" -eq 0 ]; then
            echo "::error::No secrets configured — pipeline cannot function"
            exit 1
          fi
      - name: Type check with mypy
        continue-on-error: true
        run: |
          echo "═══ Type Checking (mypy — non-blocking) ═══"
          python -m mypy \
            --ignore-missing-imports \
            --no-strict-optional \
            --no-error-summary \
            torshield_ai_gateway/ monitoring/ scripts/ \
            2>&1 | head -100 || true
          echo "  ℹ mypy completed (results are non-blocking)"
      - name: Ruff linting
        continue-on-error: true
        run: |
          echo "═══ Ruff Lint (non-blocking) ═══"
          python -m ruff check \
            torshield_ai_gateway/ monitoring/ scripts/ \
            --output-format=concise \
            2>&1 | head -100 || true
          echo "  ℹ Ruff completed (results are non-blocking)"
      - name: Run unit tests with coverage
        run: |
          set -euo pipefail
          echo "═══ Unit Tests with Coverage ═══"
          pip install pytest-cov --quiet 2>/dev/null || true
          PYTEST_LOG=$(mktemp)
          set +e
          python -m pytest tests/ \
            --cov=torshield_ai_gateway \
            --cov=core \
            --cov=sources \
            --cov-report=term-missing \
            --cov-report=html:reports/coverage_html \
            --tb=short \
            -q 2>&1 | tee "$PYTEST_LOG"
          PYTEST_STATUS=${PIPESTATUS[0]}
          set -e
          tail -50 "$PYTEST_LOG"
          if [ "$PYTEST_STATUS" -ne 0 ]; then
            exit "$PYTEST_STATUS"
          fi
          echo "  ✓ Test suite completed"
          echo "  Coverage report: reports/coverage_html/index.html"
      - name: Generate quality report
        if: always()
        run: |
          mkdir -p data
          cat > /tmp/_quality_report.py << 'ENDSCRIPT'
          import json
          import os
          from datetime import datetime, timezone

          report = {
              "timestamp": datetime.now(timezone.utc).isoformat(),
              "run_id": os.environ.get("GITHUB_RUN_ID", "unknown"),
              "checks": {}
          }

          # Syntax check result
          report["checks"]["python_syntax"] = "passed" if os.environ.get("PYTHON_SYNTAX_RESULT") != "failed" else "failed"
          report["checks"]["yaml_lint"] = "passed" if os.environ.get("YAML_LINT_RESULT") != "failed" else "failed"
          report["checks"]["requirements_validation"] = "passed"
          report["checks"]["secret_presence"] = "passed"

          # Count .py files
          py_count = 0
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in (".git", "vendor", "__pycache__", "node_modules")]
              py_count += sum(1 for f in files if f.endswith(".py"))
          report["checks"]["python_file_count"] = py_count

          # Count .yml files
          yml_count = 0
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in (".git", "vendor", "__pycache__", "node_modules")]
              yml_count += sum(1 for f in files if f.endswith((".yml", ".yaml")))
          report["checks"]["yaml_file_count"] = yml_count

          report["quality_gate"] = "passed"

          with open("data/quality_report.json", "w") as f:
              json.dump(report, f, indent=2)
          print(json.dumps(report, indent=2))
          ENDSCRIPT
          python3 /tmp/_quality_report.py
      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: quality-report-${{ github.run_id }}
          path: data/quality_report.json
          retention-days: 7
          if-no-files-found: warn
  build-rust:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Bootstrap environment defaults
        run: |
          set -euo pipefail
          bash scripts/github_actions_env_bootstrap.sh
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
      - name: Generate Cargo.lock (required for deterministic builds + cache)
        working-directory: bridge-probe
        run: |
          set -euo pipefail
          if [ ! -f Cargo.lock ]; then
            cargo generate-lockfile
            echo "Cargo.lock generated"
          else
            echo "Cargo.lock already present"
          fi
      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            bridge-probe/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('bridge-probe/Cargo.lock', 'bridge-probe/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Build bridge-probe (release)
        working-directory: bridge-probe
        env:
          RUSTFLAGS: -D warnings
        run: |
          set -euo pipefail
          cargo build --release 2>&1
      - name: Stage bridge-probe artifact
        run: |
          set -euo pipefail
          rm -rf artifact-bin
          mkdir -p artifact-bin
          cp bridge-probe/target/release/bridge-probe artifact-bin/bridge-probe
          cp bridge-probe/Cargo.lock artifact-bin/Cargo.lock
      - uses: actions/upload-artifact@v6
        with:
          name: bridge-probe-bin
          path: artifact-bin/
          retention-days: 1
  build-go:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Bootstrap environment defaults
        run: |
          set -euo pipefail
          bash scripts/github_actions_env_bootstrap.sh
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22"
          cache: true
          cache-dependency-path: go.mod
      - name: Lock canonical Go module path (fixes internal-package errors)
        run: |
          set -euo pipefail
          CANONICAL="github.com/ysa-py/MICAFP"
          LEGACY_HOST="github.com"
          LEGACY_OWNER="py-vip"
          LEGACY_REPO="ultra"
          LEGACY_MODULE="${LEGACY_HOST}/${LEGACY_OWNER}/${LEGACY_REPO}"
          CURRENT=$(grep '^module ' go.mod | awk '{print $2}')
          echo "Canonical : $CANONICAL"
          echo "Current   : $CURRENT"
          if [ "$CURRENT" != "$CANONICAL" ]; then
            echo "Patching go.mod: $CURRENT -> $CANONICAL"
            sed -i "s|^module .*|module ${CANONICAL}|" go.mod
          else
            echo "go.mod module path is canonical — no patch needed."
          fi
          find . -name '*.go' -not -path './vendor/*' | while read -r f; do
            sed -i \
              "s|\"${LEGACY_MODULE}/[^/\"']*/internal/|\"${CANONICAL}/internal/|g" \
              "$f"
          done
          echo "Import normalisation complete."
          BAD=$(grep -rn "\"${LEGACY_MODULE}/" \
                  --include='*.go' --exclude-dir=vendor . 2>/dev/null \
                | grep '/internal/' \
                | grep -v "\"${CANONICAL}/internal/" || true)
          if [ -n "$BAD" ]; then
            echo "ERROR: stale internal imports remain:"; echo "$BAD"; exit 1
          fi
          echo "Consistency check passed — zero mismatched imports."
      - name: Tidy Go modules
        run: |
          set -euo pipefail
          go mod tidy
          touch go.sum
      - name: go vet (zero errors)
        run: |
          set -euo pipefail
          go vet ./...
      - name: Build iran_tester
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux go build -o iran_tester ./cmd/iran_tester/
      - name: Build probe_scheduler
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=linux go build -o probe_scheduler ./cmd/probe_scheduler/
      - uses: actions/upload-artifact@v6
        with:
          name: go-bins
          path: |
            iran_tester
            probe_scheduler
            go.mod
            go.sum
          retention-days: 1
  scrape-and-test:
    runs-on: ubuntu-latest
    needs:
      - quality-gate
      - build-rust
      - build-go
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Bootstrap environment defaults
        run: |
          set -euo pipefail
          bash scripts/github_actions_env_bootstrap.sh
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Python dependencies
        run: |
          set -euo pipefail
          pip install -r requirements.txt
      - name: Remove Vercel secrets (cleanup — additive step)
        env:
          GH_PAT_AUTOFIX: ${{ secrets.GH_PAT_AUTOFIX }}
          GH_REPO_OWNER: ${{ secrets.GH_REPO_OWNER }}
          GH_REPO_NAME: ${{ secrets.GH_REPO_NAME }}
        run: |
          # Remove only Vercel-related secrets. All other secrets are preserved.
          cat > /tmp/_vercel_cleanup.py << 'ENDSCRIPT'
          import os, urllib.request, urllib.error, json
          token = os.environ.get("GH_PAT_AUTOFIX", "")
          owner = os.environ.get("GH_REPO_OWNER", "")
          repo  = os.environ.get("GH_REPO_NAME", "")
          if not all([token, owner, repo]):
              print("Cleanup: missing PAT -- skipping")
              exit(0)
          base = f"https://api.github.com/repos/{owner}/{repo}/actions/secrets"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }
          try:
              req = urllib.request.Request(base, headers=headers)
              with urllib.request.urlopen(req, timeout=15) as r:
                  data = json.loads(r.read())
              secrets = [s["name"] for s in data.get("secrets", [])]
          except Exception as e:
              print(f"Cleanup: could not list secrets: {e}")
              exit(0)
          vercel_secrets = [s for s in secrets if "VERCEL" in s.upper()]
          for name in vercel_secrets:
              try:
                  req = urllib.request.Request(
                      f"{base}/{name}", method="DELETE", headers=headers
                  )
                  urllib.request.urlopen(req, timeout=15)
                  print(f"Deleted Vercel secret: {name}")
              except Exception as e:
                  print(f"Could not delete {name}: {e}")
          if not vercel_secrets:
              print("No Vercel secrets found -- nothing to clean up.")
          ENDSCRIPT
          python3 /tmp/_vercel_cleanup.py
      - name: Stage 00 — Autonomous self-heal pipeline diagnostics
        continue-on-error: true
        timeout-minutes: 5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PORTKEY_API_KEY: ${{ secrets.PORTKEY_API_KEY }}
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python self_heal.py --heal
      - uses: actions/download-artifact@v8
        with:
          name: bridge-probe-bin
          path: downloaded-bin/
      - uses: actions/download-artifact@v8
        with:
          name: go-bins
          path: .
      - name: Restore bridge-probe artifact
        run: |
          set -euo pipefail
          mkdir -p bridge-probe/target/release
          cp downloaded-bin/bridge-probe bridge-probe/target/release/bridge-probe
      - name: Set executable permissions
        run: |
          set -euo pipefail
          for file in \
            bridge-probe/target/release/bridge-probe \
            iran_tester \
            probe_scheduler; do
            if ! test -f "$file"; then
              echo "::error::Missing expected executable: $file"
              find bridge-probe -maxdepth 5 -type f -print
              find . -maxdepth 2 -type f \( -name iran_tester -o -name probe_scheduler \) -print
              exit 1
            fi
            chmod +x "$file"
          done
      - name: Stage 0 — Direct scraper (bridges.torproject.org seed)
        continue-on-error: true
        timeout-minutes: 5
        run: python sources/direct_scraper.py
      - name: Stage 0b — OnionHop bridge collection
        continue-on-error: true
        timeout-minutes: 5
        run: python onionhop_collector.py
      - name: Stage 0c — Legacy scraper (Telegram ZIP + README)
        continue-on-error: true
        timeout-minutes: 5
        run: python sources/legacy_scraper.py
      - name: Stage 1 — Scraper (all sources)
        timeout-minutes: 10
        run: |
          set -euo pipefail
          python scraper.py
      - name: FAILSAFE — ensure bridge files always have content
        timeout-minutes: 3
        run: |
          set -euo pipefail
          cat > /tmp/_failsafe_bridges.py << 'ENDSCRIPT'
          import json, sys
          from pathlib import Path
          bridge_dir = Path("bridge")
          bridge_dir.mkdir(exist_ok=True)
          Path("data").mkdir(exist_ok=True)
          hist_file = bridge_dir / "bridge_history.json"
          history = {}
          if hist_file.exists() and hist_file.stat().st_size > 2:
              try:
                  history = json.loads(hist_file.read_text(encoding="utf-8"))
              except Exception as e:
                  print(f"WARNING: {e}")
          transport_map = {"obfs4": [], "snowflake": [], "meek_lite": [], "webtunnel": [], "vanilla": []}
          for k, v in history.items():
              if isinstance(v, dict):
                  t = v.get("transport", ""); raw = v.get("raw", "")
                  if t in transport_map and raw:
                      transport_map[t].append(raw.strip())
          total = 0
          for transport, bridges in transport_map.items():
              fpath = bridge_dir / f"{transport}.txt"
              if not fpath.exists() or fpath.stat().st_size == 0:
                  if bridges:
                      fpath.write_text("\n".join(bridges) + "\n", encoding="utf-8")
                      print(f"FAILSAFE: wrote {len(bridges)} {transport} bridges")
                      total += len(bridges)
              else:
                  cnt = len([l for l in fpath.read_text().splitlines() if l.strip()])
                  print(f"OK {fpath}: {cnt} bridges")
          test_json = bridge_dir / "bridge_list_for_testing.json"
          if not test_json.exists() or test_json.stat().st_size < 5:
              all_b = [v.get("raw","") for v in history.values() if isinstance(v,dict) and v.get("raw")]
              if not all_b:
                  sys.path.insert(0, ".")
                  from sources.static_bridges import get_all
                  all_b = [line for line, _, _ in get_all()]
              if all_b:
                  test_json.write_text(json.dumps(all_b, indent=2), encoding="utf-8")
                  print(f"FAILSAFE: wrote {len(all_b)} bridges to bridge_list_for_testing.json")
          print(f"FAILSAFE done. Extra bridges written: {total}")
          ENDSCRIPT
          python3 /tmp/_failsafe_bridges.py
      - name: Stage 2 — iran_tester (TCP/ASN/OONI/CDN analysis)
        timeout-minutes: 12
        run: |
          set -euo pipefail
          ./iran_tester \
            --input  bridge/bridge_list_for_testing.json \
            --output bridge/iran_results.json \
            --workers 100 \
            --timeout 8s
      - name: Stage 3 — probe_scheduler (RIPE Atlas + MOAT merge)
        continue-on-error: true
        timeout-minutes: 12
        env:
          RIPE_ATLAS_API_KEY: ${{ secrets.RIPE_ATLAS_API_KEY }}
        run: |
          timeout 300 ./probe_scheduler \
            --bridges data/iran_bridges.json \
            --port 8742 &
          SCHED_PID=$!
          echo "$SCHED_PID" > /tmp/probe_sched.pid
          echo "probe_scheduler PID=$SCHED_PID"
          touch /tmp/sched_started
          # Give the scheduler time to initialise before the Rust probe reads
          # its /results endpoint; 10 s is enough for MOAT fetch + JSON marshal.
          sleep 10
      - name: Stage 4 — bridge-probe (Rust PT handshakes)
        timeout-minutes: 15
        run: |
          set -euo pipefail
          cat bridge/bridge_list_for_testing.json \
            | ./bridge-probe/target/release/bridge-probe \
              --timeout 20 --workers 50 \
            > data/pt_results.json
      - name: Stage 4 cleanup — kill probe_scheduler
        if: always()
        run: |
          if [ -f /tmp/probe_sched.pid ]; then
            PID=$(cat /tmp/probe_sched.pid)
            echo "Terminating probe_scheduler PID=$PID"
            kill -TERM "$PID" 2>/dev/null || true
            sleep 2
            kill -KILL "$PID" 2>/dev/null || true
            rm -f /tmp/probe_sched.pid
          fi
          # Belt-and-suspenders: release port 8742 regardless
          fuser -k 8742/tcp 2>/dev/null || true
          echo "probe_scheduler cleanup complete."
      - name: Stage 5 — OONI correlator
        continue-on-error: true
        timeout-minutes: 8
        run: python ooni_correlator.py
      - name: Stage 6a — Score bridges
        timeout-minutes: 8
        run: |
          set -euo pipefail
          python main.py --mode score
      - name: Stage 6b — Export bridge files
        timeout-minutes: 5
        run: |
          set -euo pipefail
          python main.py --mode export
      - name: Stage 7 — ML blocking predictor
        continue-on-error: true
        timeout-minutes: 8
        run: python ml_predictor.py --train --apply
      - name: Stage 8 — Adaptive transport engine
        continue-on-error: true
        timeout-minutes: 5
        run: python adaptive_transport.py
      - name: Stage 8b — DPI intelligence report
        continue-on-error: true
        timeout-minutes: 5
        run: python dpi_evasion_advanced.py
      - name: Stage 8c — Next-gen protocol scan (Hysteria2/REALITY/VLESS)
        continue-on-error: true
        timeout-minutes: 8
        run: python next_gen_transports.py
      - name: Stage 8d — NIN internet-cut bridge pack
        continue-on-error: true
        timeout-minutes: 5
        run: python -m core.nin_selector
      - name: Stage 8d2 — NIN bypass analysis (ECH/CDN survivability scoring)
        continue-on-error: true
        timeout-minutes: 5
        run: python iran_nin_bypass.py
      - name: Stage 8e — ECH/post-quantum bridge scoring
        continue-on-error: true
        timeout-minutes: 5
        run: python quantum_safe.py
      - name: Stage 8f — WARP bootstrap check
        continue-on-error: true
        timeout-minutes: 5
        run: python warp_bootstrap.py
      - name: Stage 8g — ECH fingerprint evasion scoring
        continue-on-error: true
        timeout-minutes: 20
        run: python ech_fingerprint_evasion.py
      - name: Stage 8h — NIN advanced bypass analysis
        continue-on-error: true
        timeout-minutes: 20
        run: python nin_advanced_bypass.py
      - name: Stage 8i — Anti-AI DPI scoring
        continue-on-error: true
        timeout-minutes: 5
        run: python anti_ai_dpi.py
      - name: Stage 8i-smart — Smart Iran AI re-ranker (v9.0)
        continue-on-error: true
        timeout-minutes: 8
        env:
          CF_ACCOUNT_ID_1: ${{ secrets.CF_ACCOUNT_ID_1 }}
          CF_API_TOKEN_1: ${{ secrets.CF_API_TOKEN_1 }}
          CF_AI_GATEWAY_URL_1: ${{ secrets.CF_AI_GATEWAY_URL_1 }}
          CEREBRAS_API_KEY_1: ${{ secrets.CEREBRAS_API_KEY_1 }}
        run: |
          python scripts/ai_bridge_reranker.py \
