      - name: Stage 8o — Certificate Transparency MITM monitor
        continue-on-error: true
        timeout-minutes: 15
        run: python ztunnel_ct_monitor.py
      - name: Stage 8p — NIN internet-cut bridge classifier
        continue-on-error: true
        timeout-minutes: 6
        run: python nin_internet_cut_classifier.py
      - name: Stage 8q — Zig ultra-fast TCP bridge pre-screener
        continue-on-error: true
        timeout-minutes: 6
        run: |
          set +e
          if command -v zig &>/dev/null && [[ -d zig-scanner ]]; then
            cd zig-scanner && zig build -Doptimize=ReleaseFast 2>&1 || true
            if [[ -f zig-out/bin/zig-scanner ]]; then
              ./zig-out/bin/zig-scanner ../data/latest-results.json 2>&1 || true
            fi
            cd ..
          else
            echo "Zig not available — skipping Stage 8q"
          fi
      - name: Stage 8r — Iran SIAM/NGFW Anti-AI DPI evasion analysis
        continue-on-error: true
        timeout-minutes: 6
        run: python iran_anti_siam.py
      - name: Stage 9 — Write results + Telegram notification
        timeout-minutes: 8
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_UPLOAD: ${{ github.event.inputs.upload_to_telegram || 'false' }}
          REPO_URL: https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/${{ github.ref_name }}
        run: |
          set -euo pipefail
          python results_writer.py
      - name: Stage 10 — Bridge count summary
        timeout-minutes: 3
        run: |
          echo "═══ Bridge File Summary ═══"
          shopt -s nullglob
          for f in bridge/*.txt; do
            count=$(grep -c . "$f" 2>/dev/null) || count=0
            count=${count//[$'\t\r\n ']/}
            count=${count:-0}
            printf "%-45s %d\n" "$f" "$count"
          done
          echo "═══════════════════════════"
          ALL_OK=true
          for req in iran_likely_working_all.txt iran_likely_working_obfs4.txt iran_likely_working_webtunnel.txt; do
            fpath="bridge/$req"
            count=0
            if [ -f "$fpath" ]; then
              count=$(grep -c . "$fpath" 2>/dev/null) || count=0
              count=${count//[$'\t\r\n ']/}
              count=${count:-0}
            fi
            if [ "$count" -gt 0 ]; then
              echo "✅ $req: $count bridges"
            else
              echo "⚠️  $req: 0 bridges"
              ALL_OK=false
            fi
          done
          if [ "$ALL_OK" = "true" ]; then
            echo "✅ All required bridge files populated."
          else
            echo "⚠️  Some bridge files empty — check scraper/tester logs above."
          fi
      - name: Stage 11 — Commit and push
        timeout-minutes: 5
        run: |
          set -euo pipefail
          git config --global user.name  "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git pull origin main --rebase --autostash
          git add bridge/ data/ docs/ export/ README.md go.mod go.sum \
                  cmd/ internal/ onionhop_collector.py zig-scanner/ \
                  ebpf_blueprint.py nin_cut_tester.py xtls_reality_wrapper.py \
                  ai_dpi_mutator.py next_gen_transports.py quantum_safe.py \
                  adaptive_transport.py ja3_intelligence.py \
                  ztunnel_ct_monitor.py nin_internet_cut_classifier.py \
                  self_heal.py generate_quantum_project.sh \
                  iran_anti_siam.py core/iran_dpi_shaper.py \
                  torshield_ai_gateway/ scripts/ || true
          [ -f go.sum ] && git add go.sum || true
          [ -f bridge-probe/Cargo.lock ] && git add bridge-probe/Cargo.lock || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update bridges and Iran reachability data [skip ci]"
            git push
          fi
      - uses: actions/upload-artifact@v6
        if: always()
        with:
          name: bridge-intelligence-report
          path: |
            data/latest-results.json
            data/pt_results.json
            data/best_transports.json
