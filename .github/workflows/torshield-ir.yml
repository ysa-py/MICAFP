          p = pathlib.Path('data/smart_iran_results.json')
          if p.exists():
              d = json.loads(p.read_text())
              bs = d.get('bridges', d) if isinstance(d, dict) else d
              total = len(bs)
              excellent = sum(1 for b in bs if b.get('smart_iran_scores',{}).get('tier') == 'excellent')
