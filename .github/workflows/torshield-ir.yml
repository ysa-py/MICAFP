            data/anti_ai_dpi_report.json
            data/iran_siam_report.json
            data/smart_iran_results.json
            docs/iran-bridge-status.md
            docs/iran-siam-analysis.md
            bridge/iran_results.json
            export/iran_cut_pack.txt
            export/iran_phantom_bridges.txt
            export/iran_stealth_bridges.txt
            export/iran_siam_best_bridges.txt
            export/warp_bridges.txt
            export/ech_top_bridges.txt
            export/nin_cut_bridges.txt
            export/anti_ai_dpi_bridges.txt
            data/nin_cut_report.json
            data/reality_report.json
            data/ai_consensus_report.json
            data/pq_bridge_scores.json
            data/ja3_rotation_plan.json
            data/ja3_rotation_report.md
            data/ct_monitor_report.json
            data/zig_scan.json
            export/nin_cut_survivable.txt
            export/reality_configs.json
            export/nin_recommended_transport.json
            export/ct_flagged_domains.txt
            export/ct_clean_bridges.txt
            docs/ebpf_xdp_blueprint.md
          retention-days: 7
          if-no-files-found: ignore
  package-final-artifact:
    name: Package Final Artifact
    needs:
      - scrape-and-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout full repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Bootstrap environment defaults
        run: |
          set -euo pipefail
          bash scripts/github_actions_env_bootstrap.sh
      - name: Download all stage artifacts
        uses: actions/download-artifact@v8
        with:
          path: all_artifacts/
      - name: Bundle everything into tar.gz
        run: |
          mkdir -p dist/
          tar --exclude='.git' \
              --exclude='node_modules' \
              --exclude='__pycache__' \
              --exclude='*.pyc' \
              --exclude='bridge-probe/target' \
              --exclude='./dist' \
              --exclude='dist' \
              -czf dist/Tor-Bridges-Collector-main-ultra-quantum-vip-vip-super-ultra-vip-ultra-quantum-ultra-vip-ultra-quantum.tar.gz \
              . all_artifacts/
          echo "Archive size: $(du -sh dist/*.tar.gz | cut -f1)"
      - name: Upload Final Package
        uses: actions/upload-artifact@v6
        with:
          name: TorShield-IR-Final-Package-${{ github.run_id }}
          path: dist/Tor-Bridges-Collector-main-ultra-quantum-vip-vip-super-ultra-vip-ultra-quantum-ultra-vip-ultra-quantum.tar.gz
          retention-days: 90
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/Tor-Bridges-Collector-main-ultra-quantum-vip-vip-super-ultra-vip-ultra-quantum-ultra-vip-ultra-quantum.tar.gz
          token: ${{ secrets.GH_PAT_AUTOFIX }}
  cleanup:
    name: AI Ultra-Pro Cleanup
    if: always()
    needs:
      - quality-gate
      - build-rust
      - build-go
      - scrape-and-test
      - package-final-artifact
      - go-gate-go-quality-gate
      - go-gate-python-quality-gate
      - bridge-reranker-ai-rerank
    uses: ./.github/workflows/ai-ultra-pro-cleanup.yml
    secrets: inherit
    with:
      keep_last_n: "2"
      dry_run: false
  go-gate-go-quality-gate:
    name: Go Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Bootstrap environment defaults
        run: |
          set -euo pipefail
          bash scripts/github_actions_env_bootstrap.sh
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.work
      - name: Cache Go modules
        uses: actions/cache@v6
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Go Build
        run: |
          echo "═══ Go Build ═══"
          go build ./...
          echo "✔ Build successful"
      - name: Go Vet
        run: |
          echo "═══ Go Vet ═══"
          go vet ./...
          echo "✔ Vet passed"
      - name: Go Format Check (internal/bridge)
        run: |
          echo "═══ Format Check (internal/bridge) ═══"
          if gofmt -l ./internal/bridge/ | grep -q .; then
            echo "✘ Format check failed:"
            gofmt -l ./internal/bridge/
            echo "Run: gofmt -w ./internal/bridge/"
            exit 1
          fi
          echo "✔ Format check passed"
      - name: Go Tests
        run: |
          echo "═══ Go Tests ═══"
          go test ./... -v
          echo "✔ All tests passed"
  go-gate-python-quality-gate:
    name: Python Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Bootstrap environment defaults
        run: |
          set -euo pipefail
          bash scripts/github_actions_env_bootstrap.sh
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      - name: Python Syntax Check
        run: |
          echo "═══ Python Syntax Check ═══"
          SKIP_NETWORK_TESTS=true python3 -m pytest -q --collect-only 2>/dev/null || true
          for f in $(find . -name '*.py' -not -path './vendor/*' -not -path './.git/*' -not -path './__pycache__/*'); do
            python3 -m py_compile "$f" || exit 1
          done
          echo "✔ All Python files have valid syntax"
  go-gate-cleanup:
    name: AI Ultra-Pro Cleanup
    if: always()
    needs:
      - go-gate-go-quality-gate
