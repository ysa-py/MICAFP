---
name: Autonomous Sentinel Validation

'on':
  workflow_dispatch:
  push:
    branches: [work, main]
  pull_request:

permissions:
  contents: write
  actions: read

concurrency:
  group: autonomous-sentinel-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate-and-self-heal:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Python dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e '.[test,dev]'

      - name: LocalAI RL observe-decide-morph dry run
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from torshield_ai_gateway.local_ai_engine import LocalAIEngine
          from torshield_ai_gateway.polymorphic_traffic_morpher import PolymorphicTrafficMorpher
          engine = LocalAIEngine()
          engine.observe_feedback('unknown', 'obfs4', 'success')
          plan = PolymorphicTrafficMorpher(engine).plan(censorship_level=4)
          print(json.dumps(plan, indent=2, sort_keys=True))
          PY

      - name: Validation suite
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -q
          go test ./...
          bash scripts/check_shell_entrypoints.sh
          python scripts/security_scan.py

      - name: Set up Rust (parity-test gate)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 'stable'
          components: rustfmt, clippy

      - name: Rust parity tests (Python→Rust migration gate)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          set -euo pipefail
          cargo fmt --all -- --check
          cargo clippy --workspace --all-targets -- -D warnings
          cargo test --workspace

      - name: Revert failed generated changes and write analysis
        if: failure()
        run: |
          set -euo pipefail
          mkdir -p data
          python - <<'PY'
          import json, subprocess
          from torshield_ai_gateway.local_ai_engine import LocalAIEngine
          analysis = LocalAIEngine().analyze_workflow_failure('autonomous-sentinel', 'validation failed')
          open('data/autonomous_sentinel_failure.json', 'w', encoding='utf-8').write(json.dumps(analysis, indent=2))
          subprocess.run(['git', 'checkout', '--', 'data/local_ai_censorship_state.json'], check=False)
          PY

      - name: Commit LocalAI state updates
        if: success() && github.event_name != 'pull_request'
        run: |
          set -euo pipefail
          if git diff --quiet -- data/local_ai_censorship_state.json; then
            echo 'No LocalAI state changes to commit.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/local_ai_censorship_state.json
          git commit -m 'auto(local-ai): update censorship RL state [skip ci]'
          git push
