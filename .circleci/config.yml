# ════════════════════════════════════════════════════════════════════════════
# TorShield-IR — Ultra VIP Zero-Error Quantum Edition
# CircleCI configuration — additive mirror of .github/workflows/* + Scheduled
# Pipelines for OONI polling every 6 h / 12 h.
#
# DESIGN PRINCIPLES (per project RULE-0-A — additive only):
#   • Every existing GitHub workflow is mirrored 1:1 as a CircleCI job.
#   • Nothing in .github/workflows/, .gitlab-ci.yml, or the Python/Go/Rust
#     source tree is removed or weakened.
#   • All secrets are referenced from the `torshield-ir-secrets` CircleCI
#     Context (Project Settings → Contexts). They are NEVER hardcoded.
#   • The runtime .env file is materialised at job start by
#     scripts/circleci_env_bootstrap.sh from those Context variables, so
#     every Python module that calls load_dotenv() continues to work.
#
# SCHEDULED PIPELINES (the part that replaces Northflank):
#   The cron expressions themselves are NOT defined here — CircleCI requires
#   them to be configured in the web UI at:
#       Project Settings → Triggers → Add Schedule
#   See .circleci/README.md for the exact schedule definitions to create.
#   This config.yml declares the parameters that the schedules pass in, and
#   gates the scheduled workflows on those parameters.
#
# Docs referenced:
#   - Scheduled Pipelines: https://circleci.com/docs/guides/orchestrate/triggers-overview
#   - Contexts:            https://circleci.com/docs/contexts
#   - Configuration ref:   https://circleci.com/docs/configuration-reference
# ════════════════════════════════════════════════════════════════════════════
version: 2.1

# ─────────────────────────────────────────────────────────────────────────────
# Pipeline parameters — schedules pass these in to select which workflows run.
# ─────────────────────────────────────────────────────────────────────────────
parameters:
  run-quality-gate:
    type: boolean
    default: true
  run-build:
    type: boolean
    default: true
  run-scrape:
    type: boolean
    default: false        # heavy; only on push to main, or scheduled
  run-rerank:
    type: boolean
    default: false
  run-healthcheck:
    type: boolean
    default: false        # scheduled
  run-self-heal:
    type: boolean
    default: false        # triggered on failure
  run-ooni-poll:
    type: boolean
    default: false        # scheduled (6 h)
  run-ooni-poll-deep:
    type: boolean
    default: false        # scheduled (12 h, deeper history)
  run-packaging:
    type: boolean
    default: false        # manual or after a successful scrape
  schedule-source:
    type: string
    default: "manual"     # one of: manual | hourly | 6h | 12h | daily

# ─────────────────────────────────────────────────────────────────────────────
# Orbs — third-party reusable components.
# ─────────────────────────────────────────────────────────────────────────────
orbs:
  # Python toolchain (setup-python equivalent)
  python: circleci/python@2.1.1
  # Go toolchain (setup-go equivalent)
  go: circleci/go@1.7.3
  # Rust toolchain for bridge-probe
  rust: circleci/rust@1.6.0
  # Browser/artifact helpers
  browser-tools: circleci/browser-tools@1.5.2
  # Slack notifications (optional — silently no-ops if SLACK_WEBHOOK unset)
  slack: circleci/slack@4.13.3
  # GitHub status reporting (so PRs get check marks from CircleCI too)
  github-cli: circleci/github-cli@2.2.0

# ─────────────────────────────────────────────────────────────────────────────
# Executors — reusable execution environments.
# ─────────────────────────────────────────────────────────────────────────────
executors:
  python-312:
    docker:
      - image: cimg/python:3.12
        auth: &ghcr-auth
          username: $DOCKERHUB_USERNAME
          password: $DOCKERHUB_PASSWORD
    resource_class: medium
    environment:
      PIP_CACHE_DIR: /home/circleci/.cache/pip
      NODE_NO_WARNINGS: "1"
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"

  python-312-large:
    docker:
      - image: cimg/python:3.12
        auth: *ghcr-auth
    resource_class: large
    environment:
      PIP_CACHE_DIR: /home/circleci/.cache/pip
      NODE_NO_WARNINGS: "1"
      PYTHONUNBUFFERED: "1"

  go-122:
    docker:
      - image: cimg/go:1.22
        auth: *ghcr-auth
    resource_class: medium
    environment:
      GOFLAGS: "-trimpath -mod=readonly"
      GOPRIVATE: ""

  rust-180:
    docker:
      - image: cimg/rust:1.80
        auth: *ghcr-auth
    resource_class: medium

  node-20:
    docker:
      - image: cimg/node:20.18
        auth: *ghcr-auth
    resource_class: small

# ─────────────────────────────────────────────────────────────────────────────
# Commands — reusable step groups.
# ─────────────────────────────────────────────────────────────────────────────
commands:
  checkout-with-history:
    description: "Full-clone checkout (mirrors GitHub fetch-depth: 0)."
    steps:
      - checkout
      - run:
          name: "Ensure full git history"
          command: |
            git fetch --unshallow || true
            git config --global user.email "circleci-bot@users.noreply.github.com"
            git config --global user.name  "TorShield-IR CircleCI Bot"

  materialise-env:
    description: >
      Write the runtime .env from CircleCI Context variables.
      This is the env transfer — every var in configs/env_template.sh
      has a matching entry in the torshield-ir-secrets Context, and is
      materialised into .env at job start so load_dotenv() keeps working.
    steps:
      - run:
          name: "Materialise .env from Context"
          command: |
            bash scripts/circleci_env_bootstrap.sh
      - persist_to_workspace:
          root: .
          paths:
            - .env

  install-python-deps:
    description: "pip install -r requirements.txt with cache."
    steps:
      - restore_cache:
          name: "Restore pip cache"
          keys:
            - pip-{{ checksum "requirements.txt" }}-v1
            - pip-
      - run:
          name: "pip install"
          command: |
            python -m pip install --upgrade pip
            pip install -r requirements.txt
      - save_cache:
          name: "Save pip cache"
          key: pip-{{ checksum "requirements.txt" }}-v1
          paths:
            - /home/circleci/.cache/pip

  attach-env:
    description: "Attach workspace and ensure .env is present."
    steps:
      - attach_workspace:
          at: .
      - run:
          name: "Verify .env present"
          command: |
            test -f .env || { echo "FATAL: .env missing"; exit 1; }
            set -a; source .env; set +a
            echo "Loaded $(grep -c '=' .env) env entries."

  notify-slack-on-failure:
    description: "Optional Slack alert on failure (no-op without webhook)."
    steps:
      - slack/notify:
          event: fail
          template: basic_fail_1
          channel: "${SLACK_CHANNEL:-#torshield-alerts}"

  notify-slack-on-success:
    description: "Optional Slack alert on success."
    steps:
      - slack/notify:
          event: pass
          template: basic_success_1
          channel: "${SLACK_CHANNEL:-#torshield-alerts}"

# ─────────────────────────────────────────────────────────────────────────────
# Jobs — every GitHub workflow step has a matching CircleCI job.
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # 1) QUALITY GATE  (mirror of .github/workflows/torshield-ir.yml → quality-gate)
  # ══════════════════════════════════════════════════════════════════════════
  quality-gate:
    executor: python-312
    parallelism: 1
    steps:
      - checkout-with-history
      - install-python-deps
      - run:
          name: "Python syntax check (py_compile)"
          command: |
            set -euo pipefail
            echo "═══ Python Syntax Check ═══"
            PASS=0; FAIL=0
            while IFS= read -r -d '' f; do
              if python -m py_compile "$f" 2>/dev/null; then
                PASS=$((PASS + 1))
              else
                echo "  ✗ SYNTAX ERROR: $f"
                python -m py_compile "$f" 2>&1 || true
                FAIL=$((FAIL + 1))
              fi
            done < <(find . -name '*.py' -not -path './.venv/*' -not -path './build/*' -print0)
            echo "Pass: $PASS   Fail: $FAIL"
            [ "$FAIL" -eq 0 ] || exit 1
      - run:
          name: "YAML lint (.circleci + .github + .gitlab)"
          command: |
            python -c "import yaml,sys,glob; [yaml.safe_load(open(f)) for f in glob.glob('**/*.yml', recursive=True) if '.venv/' not in f]" || exit 1
            echo "✓ YAML OK"
      - run:
          name: "ruff (lint)"
          command: ruff check . --exclude .venv --exclude build
      - run:
          name: "mypy (type-check)"
          command: mypy . --ignore-missing-imports --no-error-summary
      - run:
          name: "pytest + coverage"
          command: |
            mkdir -p reports
            pytest --cov=. --cov-report=xml:reports/coverage.xml \
                   --cov-report=html:reports/coverage_html \
                   --junitxml=reports/junit.xml \
                   -ra -q
      - store_test_results:
          path: reports
      - store_artifacts:
          path: reports
      - notify-slack-on-failure

  # ══════════════════════════════════════════════════════════════════════════
  # 2) GO QUALITY GATE  (mirror of .github/workflows/go-quality-gate.yml)
  # ══════════════════════════════════════════════════════════════════════════
  go-quality-gate:
    executor: go-122
    steps:
      - checkout-with-history
      - restore_cache:
          keys:
            - go-mod-{{ checksum "go.sum" }}-v1
            - go-mod-v1
      - run:
          name: "go vet"
          command: |
            go vet ./...
      - run:
          name: "gofmt -l (should print nothing)"
          command: |
            out=$(gofmt -l . 2>/dev/null | grep -v '^vendor/' || true)
            if [ -n "$out" ]; then echo "$out"; exit 1; fi
      - run:
          name: "go test (short)"
          command: |
            set -euo pipefail
            mkdir -p reports
            go test -short -count=1 ./... 2>&1 | tee reports/go-test.log
      - run:
          name: "go_tester quality gate (REMEDIATION 2026-06-21 — was invisible to ./... before go.work existed; kept explicit here as defense in depth)"
          command: |
            set -euo pipefail
            mkdir -p reports
            cd go_tester
            go vet ./... 2>&1 | tee ../reports/go-tester-vet.log
            go build ./... 2>&1 | tee ../reports/go-tester-build.log
            go test -count=1 ./... 2>&1 | tee ../reports/go-tester-test.log
      - save_cache:
          key: go-mod-{{ checksum "go.sum" }}-v1
          paths:
            - /home/circleci/go/pkg/mod
      - store_artifacts:
          path: reports
      - notify-slack-on-failure

  # ══════════════════════════════════════════════════════════════════════════
  # 3) BUILD — Rust bridge-probe + Go iran_tester & probe_scheduler
  # ══════════════════════════════════════════════════════════════════════════
  build-rust:
    executor: rust-180
    steps:
      - checkout-with-history
      - restore_cache:
          keys:
            - cargo-{{ checksum "bridge-probe/Cargo.toml" }}-v1
            - cargo-v1
      - run:
          name: "Build bridge-probe (release)"
          command: |
            cd bridge-probe
            cargo build --release
            cp target/release/bridge-probe ../bridge-probe-bin || true
      - run:
          name: "Rust unit tests"
          command: |
            cd bridge-probe
            cargo test --release
      - save_cache:
          key: cargo-{{ checksum "bridge-probe/Cargo.toml" }}-v1
          paths:
            - ~/.cargo/registry
            - ~/.cargo/git
            - bridge-probe/target
      - persist_to_workspace:
          root: .
          paths:
            - bridge-probe-bin
      - store_artifacts:
          path: bridge-probe-bin
      - notify-slack-on-failure

  build-go:
    executor: go-122
    steps:
      - checkout-with-history
      - restore_cache:
          keys:
            - go-mod-{{ checksum "go.sum" }}-v1
            - go-mod-v1
      - attach-env
      - run:
          name: "Build iran_tester + probe_scheduler (CGO disabled, static)"
          command: |
            CGO_ENABLED=0 GOOS=linux go build -trimpath -ldflags '-s -w' \
                -o iran_tester      ./cmd/iran_tester/
            CGO_ENABLED=0 GOOS=linux go build -trimpath -ldflags '-s -w' \
                -o probe_scheduler  ./cmd/probe_scheduler/
            ./iran_tester -h 2>&1 | head -5 || true
            ./probe_scheduler -h 2>&1 | head -5 || true
      - save_cache:
          key: go-mod-{{ checksum "go.sum" }}-v1
          paths:
            - /home/circleci/go/pkg/mod
      - persist_to_workspace:
          root: .
          paths:
            - iran_tester
            - probe_scheduler
      - store_artifacts:
          path: iran_tester
      - store_artifacts:
          path: probe_scheduler
      - notify-slack-on-failure

  # ══════════════════════════════════════════════════════════════════════════
  # 4) SCRAPE — full bridge collection + Iran reachability + AI engines
  # ══════════════════════════════════════════════════════════════════════════
  scrape:
    executor: python-312-large
    parallelism: 1
    steps:
      - checkout-with-history
      - install-python-deps
      - attach-env
      - attach_workspace:
          at: .
      - run:
          name: "Run full TorShield-IR pipeline"
          no_output_timeout: 45m
          command: |
            set -euo pipefail
            # Valid modes: all|collect|test|score|export|notify
            python main.py --mode all 2>&1 | tee logs/scrape.log
      - run:
          name: "OONI correlator"
          command: |
            python ooni_correlator.py 2>&1 | tee logs/ooni_correlator.log || true
      - run:
          name: "AI anti-DPI / quantum evasion sweep"
          command: |
            python ai_anti_dpi_iran.py      2>&1 | tee logs/ai_anti_dpi.log      || true
            python ai_dpi_quantum_evasion.py 2>&1 | tee logs/ai_dpi_quantum.log  || true
      - persist_to_workspace:
          root: .
          paths:
            - data
            - logs
            - reports
      - store_artifacts:
          path: data
      - store_artifacts:
          path: logs
      - notify-slack-on-failure

  # ══════════════════════════════════════════════════════════════════════════
  # 5) AI RE-RANKER  (mirror of .github/workflows/ai_bridge_reranker.yml)
  # ══════════════════════════════════════════════════════════════════════════
  ai-rerank:
    executor: python-312
    steps:
      - checkout-with-history
      - install-python-deps
      - attach-env
      - attach_workspace:
          at: .
      - run:
          name: "AI bridge re-ranker v9.0 (non-blocking)"
          command: |
            set -euo pipefail
            python scripts/ai_bridge_reranker.py    2>&1 | tee logs/ai_rerank.log    || true
            python scripts/ai_bridge_reranker_v2.py 2>&1 | tee logs/ai_rerank_v2.log || true
      - persist_to_workspace:
          root: .
          paths:
            - data
            - reports
      - store_artifacts:
          path: reports
      - notify-slack-on-failure

  # ══════════════════════════════════════════════════════════════════════════
  # 6) AI GATEWAY HEALTH CHECK  (mirror of .github/workflows/ai_gateway_health_check.yml)
  # ══════════════════════════════════════════════════════════════════════════
  ai-gateway-health:
    executor: python-312
    steps:
      - checkout-with-history
      - install-python-deps
      - attach-env
      - run:
          name: "AI Gateway health check (all 11 slots, non-blocking)"
          no_output_timeout: 20m
          command: |
            set -euo pipefail
            python scripts/ai_gateway_health_check.py 2>&1 | tee logs/gateway_health.log || true
      - store_artifacts:
          path: logs
      - notify-slack-on-failure

  # ══════════════════════════════════════════════════════════════════════════
  # 7) SELF-HEAL  (mirror of .github/workflows/ai_self_healing.yml)
  # ══════════════════════════════════════════════════════════════════════════
  self-heal:
    executor: python-312
    steps:
      - checkout-with-history
      - install-python-deps
      - attach-env
      - run:
          name: "Self-healing engine v2"
          command: |
            set -euo pipefail
            python recovery/self_healing_engine_v2.py 2>&1 | tee logs/self_heal.log || true
            bash scripts/zero_error_engine_v5.sh        2>&1 | tee logs/zero_error.log || true
      - store_artifacts:
          path: logs
      - notify-slack-on-failure

  # ══════════════════════════════════════════════════════════════════════════
  # 8) OONI POLL — scheduled, replaces Northflank. Runs every 6 h (shallow)
  #    and every 12 h (deep). Pulls fresh Iran measurements, writes snapshot
  #    files, commits them back to the repo via the CI bot.
  # ══════════════════════════════════════════════════════════════════════════
  ooni-poll:
    executor: python-312
    parameters:
      depth:
        type: enum
        enum: ["shallow", "deep"]
        default: "shallow"
    steps:
      - checkout-with-history
      - install-python-deps
      - attach-env
      - run:
          name: "OONI poll (<< parameters.depth >>)"
          no_output_timeout: 30m
          command: |
            set -euo pipefail
            python scripts/circleci_ooni_poller.py \
                --depth << parameters.depth >> \
                --out  data/ooni_iran_snapshot.json \
                --dashboard data/dashboard.json \
                --telemetry  data/telemetry_state.json \
                2>&1 | tee logs/ooni_poll_<< parameters.depth >>.log
      - run:
          name: "Commit & push snapshot (CI bot)"
          command: |
            if git diff --quiet --exit-code data/; then
              echo "No OONI changes since last poll — nothing to commit."
              exit 0
            fi
            git add data/ooni_iran_snapshot.json \
                    data/dashboard.json \
                    data/telemetry_state.json \
                    data/censorship_state.json \
                    logs/ooni_poll_<< parameters.depth >>.log 2>/dev/null || true
            git commit -m "chore(ooni): << parameters.depth >> poll — $(date -u +%FT%TZ)"
            # Pull-rebase to avoid losing races with the other schedule.
            git pull --rebase origin "${CIRCLE_BRANCH:-main}" || true
            git push origin "${CIRCLE_BRANCH:-main}"
      - store_artifacts:
          path: data/ooni_iran_snapshot.json
      - store_artifacts:
          path: logs
      - notify-slack-on-failure

  # ══════════════════════════════════════════════════════════════════════════
  # 9) PACKAGING — emits ultra-main-vip-zero-error-quantum-ultra.tar.gz
  # ══════════════════════════════════════════════════════════════════════════
  packaging:
    executor: python-312
    steps:
      - checkout-with-history
      - attach_workspace:
          at: .
      - run:
          name: "Build ultra-main-vip-zero-error-quantum-ultra.tar.gz"
          command: |
            bash scripts/circleci_packaging.sh
      - store_artifacts:
          path: dist/ultra-main-vip-zero-error-quantum-ultra.tar.gz
          destination: ultra-main-vip-zero-error-quantum-ultra.tar.gz
      - persist_to_workspace:
          root: .
          paths:
            - dist
      - notify-slack-on-failure
      - notify-slack-on-success

  # ══════════════════════════════════════════════════════════════════════════
  # 10) ENV BOOTSTRAP — pre-computes the .env so downstream jobs can attach it.
  # ══════════════════════════════════════════════════════════════════════════
  env-bootstrap:
    executor: python-312
    steps:
      - checkout-with-history
      - materialise-env

# ─────────────────────────────────────────────────────────────────────────────
# Workflows — orchestration. Multiple workflows gate on the parameters the
# CircleCI scheduled triggers pass in. This way one config.yml handles:
#   • push (everything except heavy scheduled jobs)
#   • scheduled 6h   (ooni-poll shallow)
#   • scheduled 12h  (ooni-poll deep + health + self-heal)
#   • manual         (everything)
# ─────────────────────────────────────────────────────────────────────────────
workflows:
  # ── Push-driven workflow (runs on every push, like GitHub Actions) ──────────
  ci-push:
    when:
      and:
        - not: << pipeline.run-ooni-poll >>
        - not: << pipeline.run-ooni-poll-deep >>
        - equal: [ "manual", << pipeline.schedule-source >> ]
    jobs:
      - env-bootstrap
      - quality-gate:
          requires: [ env-bootstrap ]
      - go-quality-gate
      - build-rust
      - build-go:
          requires: [ env-bootstrap ]
      - scrape:
          requires: [ quality-gate, build-rust, build-go ]
          filters: { branches: { only: [ main, master ] } }
      - ai-rerank:
          requires: [ scrape ]
      - packaging:
          requires: [ ai-rerank ]
          filters: { branches: { only: [ main, master ] } }

  # ── 6-hourly shallow OONI poll (the Northflank replacement) ─────────────────
  schedule-ooni-6h:
    when:
      or:
        - << pipeline.run-ooni-poll >>
        - equal: [ "6h", << pipeline.schedule-source >> ]
    jobs:
      - env-bootstrap
      - ooni-poll:
          requires: [ env-bootstrap ]
          depth: shallow

  # ── 12-hourly deep OONI poll + health check + self-heal ─────────────────────
  schedule-oomi-12h:
    when:
      or:
        - << pipeline.run-ooni-poll-deep >>
        - equal: [ "12h", << pipeline.schedule-source >> ]
    jobs:
      - env-bootstrap
      - ooni-poll:
          requires: [ env-bootstrap ]
          depth: deep
      - ai-gateway-health:
          requires: [ env-bootstrap ]
      - self-heal:
          requires: [ env-bootstrap ]

  # ── Hourly lightweight health-check (optional, opt-in via UI schedule) ──────
  schedule-hourly-health:
    when:
      equal: [ "hourly", << pipeline.schedule-source >> ]
    jobs:
      - env-bootstrap
      - ai-gateway-health:
          requires: [ env-bootstrap ]

  # ── Daily packaging & rerank (so we get a fresh tarball every day) ──────────
  schedule-daily-packaging:
    when:
      equal: [ "daily", << pipeline.schedule-source >> ]
    jobs:
      - env-bootstrap
      - quality-gate:
          requires: [ env-bootstrap ]
      - scrape:
          requires: [ quality-gate ]
      - ai-rerank:
          requires: [ scrape ]
      - packaging:
          requires: [ ai-rerank ]

  # ── On-failure self-heal (gated on the self-heal parameter; the UI trigger
  #    for this is "Trigger Pipeline" with run-self-heal=true) ─────────────────
  on-failure-self-heal:
    when: << pipeline.run-self-heal >>
    jobs:
      - env-bootstrap
      - self-heal:
          requires: [ env-bootstrap ]
